# Kirana SaaS - production nginx reverse proxy
# Drop-in default.conf for the nginx service in docker-compose.prod.yml

# Rate-limit zone for /api/v1/auth (stricter)
limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;
# Rate-limit zone for /api/v1/public (per-IP)
limit_req_zone $binary_remote_addr zone=public_zone:10m rate=60r/m;

upstream kirana_api {
    server api:4000;
    keepalive 32;
}

# --- HTTP -> HTTPS redirect (uncomment after issuing certs) ---
# server {
#     listen 80;
#     server_name _;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80 default_server;
    # listen 443 ssl http2;
    # ssl_certificate     /etc/nginx/certs/fullchain.pem;
    # ssl_certificate_key /etc/nginx/certs/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
    # add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;

    server_name _;
    client_max_body_size 2m;

    # Common headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Health (no rate limit, no logs)
    location = /health {
        access_log off;
        proxy_pass http://kirana_api;
    }

    # Auth endpoints — strict rate limit
    location /api/v1/auth/ {
        limit_req zone=auth_zone burst=5 nodelay;
        proxy_pass http://kirana_api;
        include /etc/nginx/conf.d/proxy_common.conf;
    }

    # Public storefront APIs
    location /api/v1/public/ {
        limit_req zone=public_zone burst=20 nodelay;
        proxy_pass http://kirana_api;
        include /etc/nginx/conf.d/proxy_common.conf;
    }

    # Everything else (UI, API)
    location / {
        proxy_pass http://kirana_api;
        include /etc/nginx/conf.d/proxy_common.conf;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
}
