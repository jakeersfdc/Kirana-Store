# Fly.io — zero-cost hobby deploy (3 VMs + 3GB volumes free, no CC for hobby)
# Setup once:  iwr https://fly.io/install.ps1 -useb | iex
#              fly auth signup
#              fly launch --copy-config --no-deploy --name kirana-api --region sin
#              fly postgres create --name kirana-db --region sin --vm-size shared-cpu-1x --volume-size 1
#              fly postgres attach --app kirana-api kirana-db
#              fly secrets set JWT_SECRET=$(openssl rand -base64 48) RUN_MIGRATIONS=true CORS_ORIGINS=*
#              fly deploy
app = "kirana-api"
primary_region = "sin"
kill_signal = "SIGTERM"
kill_timeout = "20s"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "4000"
  TRUST_PROXY = "1"
  LOG_LEVEL = "info"
  DB_DIALECT = "postgres"
  DB_SSL = "true"
  RUN_MIGRATIONS = "true"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"   # free-tier autoscale to zero
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

[mounts]
  source = "kirana_data"
  destination = "/app/data"
