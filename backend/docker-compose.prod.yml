name: kirana-prod

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [internal]
    # Do NOT expose 5432 publicly in production
    expose: ['5432']

  api:
    build: .
    image: kirana-saas-api:latest
    restart: always
    env_file: .env.production
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_DIALECT: postgres
      RUN_MIGRATIONS: 'true'
      TRUST_PROXY: '1'
    depends_on:
      db:
        condition: service_healthy
    networks: [internal]
    expose: ['4000']
    deploy:
      resources:
        limits:
          memory: 768M
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'

  nginx:
    image: nginx:1.27-alpine
    restart: always
    depends_on: [api]
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/proxy_common.conf:/etc/nginx/conf.d/proxy_common.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
    networks: [internal]

volumes:
  db_data:

networks:
  internal:
    driver: bridge
