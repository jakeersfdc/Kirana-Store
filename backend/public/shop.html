<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0c831f" />
<title>Kirana — Groceries in Minutes</title>
<style>
  :root {
    --green: #0c831f;
    --green-dark: #0a6b19;
    --yellow: #f8cb46;
    --bg: #f6f7f9;
    --card: #ffffff;
    --text: #1c1c1c;
    --muted: #6b7280;
    --border: #ececec;
    --danger: #e02424;
    --radius: 14px;
    --shadow: 0 1px 2px rgba(0,0,0,.05), 0 4px 12px rgba(0,0,0,.04);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; font-size: 15px; }
  body { padding-bottom: 90px; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }
  input { font-family: inherit; }

  /* Top bar */
  .topbar {
    position: sticky; top: 0; z-index: 20;
    background: linear-gradient(180deg, var(--yellow) 0%, #f7c431 100%);
    padding: 14px 16px 12px;
    box-shadow: 0 1px 6px rgba(0,0,0,.08);
  }
  .delivery-pill { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 16px; }
  .delivery-pill .mins { background: #000; color: #fff; padding: 3px 8px; border-radius: 6px; font-size: 12px; }
  .store-name { font-size: 13px; color: #333; margin-top: 2px; font-weight: 500; }
  .search {
    display: flex; align-items: center; gap: 8px;
    background: #fff; border-radius: 12px; padding: 10px 14px; margin-top: 10px;
    box-shadow: 0 1px 3px rgba(0,0,0,.06);
  }
  .search input { flex: 1; border: none; outline: none; font-size: 15px; background: transparent; }
  .search-icon { color: var(--muted); }

  /* Hero banner */
  .hero {
    margin: 14px 16px; border-radius: var(--radius);
    background: linear-gradient(135deg, #0c831f 0%, #16a34a 100%);
    color: #fff; padding: 18px 20px; box-shadow: var(--shadow);
    position: relative; overflow: hidden;
  }
  .hero h2 { margin: 0; font-size: 20px; letter-spacing: -.3px; }
  .hero p { margin: 4px 0 0; opacity: .9; font-size: 13px; }
  .hero::after {
    content: "🛒"; position: absolute; right: -6px; bottom: -12px; font-size: 80px; opacity: .15;
  }

  /* Categories strip */
  .section-title { padding: 6px 16px; margin: 14px 0 8px; font-weight: 700; font-size: 15px; letter-spacing: -.2px; }
  .categories {
    display: flex; gap: 10px; overflow-x: auto;
    padding: 2px 16px 6px; scrollbar-width: none;
  }
  .categories::-webkit-scrollbar { display: none; }
  .chip {
    flex: 0 0 auto; padding: 8px 14px; background: #fff; border: 1px solid var(--border);
    border-radius: 20px; font-size: 13px; font-weight: 500; white-space: nowrap;
  }
  .chip.active { background: var(--green); color: #fff; border-color: var(--green); }

  /* Product grid */
  .grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 4px 12px 20px;
  }
  @media (min-width: 560px) { .grid { grid-template-columns: repeat(3, 1fr); } }
  @media (min-width: 820px) { .grid { grid-template-columns: repeat(4, 1fr); padding: 4px 24px 20px; } }
  @media (min-width: 1100px) { .grid { grid-template-columns: repeat(5, 1fr); } }

  .card {
    background: var(--card); border-radius: var(--radius); padding: 10px;
    display: flex; flex-direction: column; position: relative;
    box-shadow: var(--shadow); border: 1px solid var(--border);
  }
  .card .img {
    width: 100%; aspect-ratio: 1/1; border-radius: 10px; background: #f1f5f0;
    display: flex; align-items: center; justify-content: center; font-size: 42px; margin-bottom: 8px;
  }
  .card .name { font-size: 13.5px; font-weight: 600; line-height: 1.25; margin: 2px 0 4px; min-height: 34px; overflow: hidden; }
  .card .qty { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .card .row { display: flex; align-items: center; justify-content: space-between; gap: 6px; margin-top: auto; }
  .card .price { font-weight: 700; font-size: 14px; }
  .card .unit { font-size: 11px; color: var(--muted); font-weight: 400; }
  .card .stock-low { position: absolute; top: 8px; left: 8px; background: #fde68a; color: #854d0e; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; }
  .card .stock-out { background: #fecaca; color: #991b1b; }

  .btn-add {
    background: #fff; color: var(--green); border: 1.5px solid var(--green);
    padding: 6px 14px; border-radius: 8px; font-weight: 700; font-size: 13px;
  }
  .btn-add:hover { background: #f0fdf4; }
  .btn-add[disabled] { border-color: #ccc; color: #999; }
  .qty-ctl { display: inline-flex; align-items: center; background: var(--green); color: #fff; border-radius: 8px; overflow: hidden; }
  .qty-ctl button { color: #fff; padding: 6px 10px; font-weight: 700; font-size: 14px; }
  .qty-ctl span { padding: 0 8px; font-weight: 700; font-size: 13px; min-width: 24px; text-align: center; }

  /* Floating cart bar */
  .cartbar {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 30;
    background: var(--green); color: #fff; padding: 14px 18px;
    display: none; align-items: center; justify-content: space-between;
    box-shadow: 0 -4px 14px rgba(0,0,0,.15);
    padding-bottom: calc(14px + env(safe-area-inset-bottom, 0));
  }
  .cartbar.show { display: flex; }
  .cartbar .info { font-size: 13px; }
  .cartbar .info b { display: block; font-size: 15px; }
  .cartbar .view { background: #fff; color: var(--green); padding: 10px 16px; border-radius: 8px; font-weight: 700; font-size: 14px; }

  /* Drawer */
  .backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 40; display: none; }
  .backdrop.show { display: block; }
  .drawer {
    position: fixed; right: 0; top: 0; bottom: 0; width: 420px; max-width: 100%;
    background: #fff; z-index: 50; transform: translateX(100%); transition: transform .25s ease;
    display: flex; flex-direction: column;
  }
  .drawer.show { transform: translateX(0); }
  .drawer-head { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .drawer-head h3 { margin: 0; font-size: 17px; }
  .drawer-body { flex: 1; overflow-y: auto; padding: 10px 16px; }
  .drawer-foot { border-top: 1px solid var(--border); padding: 14px 16px; padding-bottom: calc(14px + env(safe-area-inset-bottom, 0)); background: #fafafa; }

  .line {
    display: flex; align-items: center; gap: 10px; padding: 10px 0;
    border-bottom: 1px dashed var(--border);
  }
  .line .thumb { width: 44px; height: 44px; border-radius: 8px; background: #f1f5f0; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .line .info { flex: 1; min-width: 0; }
  .line .info b { font-size: 13.5px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .line .info small { color: var(--muted); font-size: 11.5px; }

  .tot-row { display: flex; justify-content: space-between; padding: 4px 0; font-size: 14px; }
  .tot-row.grand { font-weight: 700; font-size: 16px; border-top: 1px solid var(--border); margin-top: 6px; padding-top: 8px; }

  .form-group { margin: 10px 0; }
  .form-group label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; font-weight: 500; }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
    font-size: 14px; outline: none; background: #fff;
  }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--green); }

  .btn-primary {
    width: 100%; background: var(--green); color: #fff; padding: 14px; border-radius: 10px;
    font-weight: 700; font-size: 15px; margin-top: 6px;
  }
  .btn-primary:hover { background: var(--green-dark); }
  .btn-primary[disabled] { opacity: .6; cursor: not-allowed; }
  .btn-ghost { width: 100%; background: transparent; color: var(--muted); padding: 10px; font-size: 13px; text-align: center; }

  .toggle { display: flex; gap: 8px; margin: 6px 0 10px; }
  .toggle button { flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: #fff; font-size: 13px; font-weight: 500; }
  .toggle button.active { background: var(--green); color: #fff; border-color: var(--green); }

  .empty { text-align: center; color: var(--muted); padding: 50px 20px; font-size: 14px; }
  .empty .big { font-size: 56px; margin-bottom: 8px; }

  /* Success screen */
  .success { text-align: center; padding: 40px 20px; }
  .success .check { width: 72px; height: 72px; margin: 0 auto 16px; border-radius: 50%; background: #dcfce7; display: flex; align-items: center; justify-content: center; font-size: 40px; }
  .success h2 { margin: 0 0 6px; }
  .success .ord { background: #f6f7f9; padding: 10px; border-radius: 8px; font-family: monospace; margin: 12px 0; font-size: 13px; }

  .store-select {
    background: rgba(0,0,0,.08); color: #000; border: none; font-size: 12px; padding: 3px 8px;
    border-radius: 6px; font-weight: 500; margin-left: 8px;
  }

  .spinner {
    display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff; border-radius: 50%; animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-grid { padding: 40px; text-align: center; color: var(--muted); }
</style>
</head>
<body>

<div class="topbar">
  <div class="delivery-pill">
    <span class="mins">10 mins</span>
    <span>Delivery to your doorstep</span>
  </div>
  <div class="store-name" id="storeName">
    Loading… <select class="store-select" id="storeSelect"></select>
  </div>
  <div class="search">
    <span class="search-icon">🔍</span>
    <input id="searchInput" placeholder='Search "rice", "milk", "biscuits"…' />
  </div>
</div>

<div class="hero">
  <h2>Fresh groceries, delivered fast</h2>
  <p>Paisa vasool prices from your trusted neighborhood Kirana 🛒</p>
</div>

<div class="section-title">Shop by category</div>
<div class="categories" id="categories"></div>

<div class="section-title" id="productsTitle">All products</div>
<div class="grid" id="grid">
  <div class="loading-grid">Loading products…</div>
</div>

<div class="cartbar" id="cartbar">
  <div class="info">
    <span id="cartCount">0 items</span>
    <b id="cartTotal">₹0</b>
  </div>
  <button class="view" onclick="openCart()">View cart →</button>
</div>

<div class="backdrop" id="backdrop" onclick="closeCart()"></div>

<div class="drawer" id="drawer">
  <div class="drawer-head">
    <h3 id="drawerTitle">Your cart</h3>
    <button onclick="closeCart()" style="font-size:22px; color:#666;">✕</button>
  </div>
  <div class="drawer-body" id="drawerBody"></div>
  <div class="drawer-foot" id="drawerFoot"></div>
</div>

<script>
  const API = '/api/v1/public';
  let state = {
    storeId: null,
    stores: [],
    products: [],
    categories: [],
    filter: { category: null, q: '' },
    cart: {}, // productId -> {product, qty}
    checkoutStep: 'cart', // cart | checkout | success
    lastOrder: null,
  };

  const INR = (n) => '₹' + Number(n || 0).toFixed(0);
  const emoji = (cat) => ({
    'Grains': '🌾', 'Pulses': '🫘', 'Sweeteners': '🍬', 'Dairy': '🥛',
    'Oil': '🫒', 'Snacks': '🍪', 'Beverages': '🥤', 'Fruits': '🍎',
    'Vegetables': '🥦', 'Bakery': '🍞', 'Personal Care': '🧴', 'Household': '🧹',
  }[cat] || '🛒');

  function save() { try { localStorage.setItem('kirana_cart_' + state.storeId, JSON.stringify(state.cart)); } catch(e){} }
  function load() {
    try {
      const raw = localStorage.getItem('kirana_cart_' + state.storeId);
      state.cart = raw ? JSON.parse(raw) : {};
    } catch(e) { state.cart = {}; }
  }

  async function api(path) {
    const res = await fetch(API + path);
    if (!res.ok) throw new Error('Request failed');
    return (await res.json()).data;
  }

  async function init() {
    try {
      state.stores = await api('/stores');
      if (!state.stores.length) {
        document.getElementById('grid').innerHTML = '<div class="empty"><div class="big">🏪</div>No stores are available right now.</div>';
        return;
      }
      // pick from URL ?store=id, else localStorage, else first
      const urlStore = new URLSearchParams(location.search).get('store');
      const saved = localStorage.getItem('kirana_store');
      state.storeId = urlStore || saved || state.stores[0].id;
      if (!state.stores.find(s => s.id === state.storeId)) state.storeId = state.stores[0].id;
      localStorage.setItem('kirana_store', state.storeId);

      renderStoreBar();
      load();
      await loadCatalogue();
      updateCartBar();
    } catch (err) {
      document.getElementById('grid').innerHTML = '<div class="empty"><div class="big">⚠️</div>Could not connect. Please refresh.</div>';
    }
  }

  function renderStoreBar() {
    const store = state.stores.find(s => s.id === state.storeId);
    const sel = document.getElementById('storeSelect');
    sel.innerHTML = state.stores.map(s => `<option value="${s.id}" ${s.id === state.storeId ? 'selected' : ''}>${s.name}</option>`).join('');
    sel.onchange = (e) => {
      state.storeId = e.target.value;
      localStorage.setItem('kirana_store', state.storeId);
      load();
      loadCatalogue();
      updateCartBar();
    };
    document.getElementById('storeName').innerHTML = `<span>📍 ${store.name}</span>`;
    document.getElementById('storeName').appendChild(sel);
  }

  async function loadCatalogue() {
    document.getElementById('grid').innerHTML = '<div class="loading-grid">Loading products…</div>';
    const [products, categories] = await Promise.all([
      api(`/stores/${state.storeId}/products`),
      api(`/stores/${state.storeId}/categories`),
    ]);
    state.products = products;
    state.categories = categories;
    renderCategories();
    renderProducts();
  }

  function renderCategories() {
    const el = document.getElementById('categories');
    el.innerHTML = '';
    const all = document.createElement('button');
    all.className = 'chip' + (!state.filter.category ? ' active' : '');
    all.textContent = 'All';
    all.onclick = () => { state.filter.category = null; renderCategories(); renderProducts(); };
    el.appendChild(all);
    state.categories.forEach(cat => {
      const b = document.createElement('button');
      b.className = 'chip' + (state.filter.category === cat ? ' active' : '');
      b.textContent = emoji(cat) + ' ' + cat;
      b.onclick = () => { state.filter.category = cat; renderCategories(); renderProducts(); };
      el.appendChild(b);
    });
  }

  function renderProducts() {
    const q = (state.filter.q || '').toLowerCase().trim();
    const list = state.products.filter(p => {
      if (state.filter.category && p.category !== state.filter.category) return false;
      if (q && !p.name.toLowerCase().includes(q)) return false;
      return true;
    });
    document.getElementById('productsTitle').textContent = state.filter.category ? state.filter.category : (q ? 'Search results' : 'All products');
    const grid = document.getElementById('grid');
    if (!list.length) {
      grid.innerHTML = '<div class="empty" style="grid-column:1/-1;"><div class="big">🔍</div>No products found.</div>';
      return;
    }
    grid.innerHTML = list.map(p => card(p)).join('');
  }

  function card(p) {
    const inCart = state.cart[p.id]?.qty || 0;
    const stock = Number(p.stock);
    const out = stock <= 0;
    const low = stock > 0 && stock <= 5;
    return `
      <div class="card" data-id="${p.id}">
        ${out ? '<div class="stock-low stock-out">Out of stock</div>' : (low ? '<div class="stock-low">Only ' + stock + ' left</div>' : '')}
        <div class="img">${emoji(p.category)}</div>
        <div class="name">${escapeHtml(p.name)}</div>
        <div class="qty">${p.unit || 'unit'} · ${p.category || ''}</div>
        <div class="row">
          <div>
            <div class="price">${INR(p.price)}</div>
            ${p.mrp && Number(p.mrp) > Number(p.price) ? '<div class="unit" style="text-decoration:line-through">' + INR(p.mrp) + '</div>' : ''}
          </div>
          ${out ? '<button class="btn-add" disabled>Out</button>' :
            (inCart > 0
              ? `<div class="qty-ctl"><button onclick="changeQty('${p.id}', -1)">−</button><span>${inCart}</span><button onclick="changeQty('${p.id}', 1)">+</button></div>`
              : `<button class="btn-add" onclick="addToCart('${p.id}')">ADD</button>`)}
        </div>
      </div>
    `;
  }

  function escapeHtml(s) { return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function addToCart(id) {
    const p = state.products.find(x => x.id === id);
    if (!p) return;
    state.cart[id] = { product: p, qty: 1 };
    save(); renderProducts(); updateCartBar();
  }
  function changeQty(id, delta) {
    const entry = state.cart[id];
    if (!entry) return;
    const p = entry.product;
    const next = entry.qty + delta;
    if (next <= 0) {
      delete state.cart[id];
    } else if (next > Number(p.stock)) {
      alert('Only ' + p.stock + ' in stock');
      return;
    } else {
      entry.qty = next;
    }
    save(); renderProducts(); updateCartBar();
    if (state.checkoutStep === 'cart' && document.getElementById('drawer').classList.contains('show')) {
      renderDrawer();
    }
  }

  function cartItems() { return Object.values(state.cart); }
  function cartCount() { return cartItems().reduce((n, i) => n + i.qty, 0); }
  function cartSubtotal() { return cartItems().reduce((n, i) => n + i.qty * Number(i.product.price), 0); }

  function updateCartBar() {
    const n = cartCount();
    const bar = document.getElementById('cartbar');
    if (n === 0) { bar.classList.remove('show'); return; }
    bar.classList.add('show');
    document.getElementById('cartCount').textContent = n + ' item' + (n > 1 ? 's' : '');
    document.getElementById('cartTotal').textContent = INR(cartSubtotal());
  }

  function openCart() { state.checkoutStep = 'cart'; renderDrawer(); document.getElementById('drawer').classList.add('show'); document.getElementById('backdrop').classList.add('show'); }
  function closeCart() { document.getElementById('drawer').classList.remove('show'); document.getElementById('backdrop').classList.remove('show'); }

  function renderDrawer() {
    const body = document.getElementById('drawerBody');
    const foot = document.getElementById('drawerFoot');
    const title = document.getElementById('drawerTitle');

    if (state.checkoutStep === 'success') {
      title.textContent = 'Order placed';
      const o = state.lastOrder;
      body.innerHTML = `
        <div class="success">
          <div class="check">✓</div>
          <h2>Order placed!</h2>
          <p style="color:#666;margin:0">Your Kirana will call you shortly to confirm.</p>
          <div class="ord">Order: ${o?.orderNumber || ''}</div>
          <p style="font-size:13px;color:#666">Total paid: <b>${INR(o?.total)}</b></p>
        </div>`;
      foot.innerHTML = `<button class="btn-primary" onclick="closeCart()">Continue shopping</button>`;
      return;
    }

    const items = cartItems();
    if (!items.length) {
      title.textContent = 'Your cart';
      body.innerHTML = '<div class="empty"><div class="big">🛒</div>Your cart is empty.</div>';
      foot.innerHTML = `<button class="btn-ghost" onclick="closeCart()">Keep shopping</button>`;
      return;
    }

    if (state.checkoutStep === 'cart') {
      title.textContent = 'Your cart (' + cartCount() + ')';
      body.innerHTML = items.map(i => `
        <div class="line">
          <div class="thumb">${emoji(i.product.category)}</div>
          <div class="info">
            <b>${escapeHtml(i.product.name)}</b>
            <small>${INR(i.product.price)} × ${i.qty}</small>
          </div>
          <div class="qty-ctl">
            <button onclick="changeQty('${i.product.id}', -1)">−</button>
            <span>${i.qty}</span>
            <button onclick="changeQty('${i.product.id}', 1)">+</button>
          </div>
        </div>
      `).join('');
      const subtotal = cartSubtotal();
      const delivery = subtotal >= 299 ? 0 : 25;
      const total = subtotal + delivery;
      foot.innerHTML = `
        <div class="tot-row"><span>Item total</span><span>${INR(subtotal)}</span></div>
        <div class="tot-row"><span>Delivery charge</span><span>${delivery ? INR(delivery) : 'FREE'}</span></div>
        <div class="tot-row grand"><span>To pay</span><span>${INR(total)}</span></div>
        ${subtotal < 299 ? '<div style="font-size:11.5px;color:#6b7280;margin:4px 0 10px;">Add ' + INR(299 - subtotal) + ' more for free delivery</div>' : ''}
        <button class="btn-primary" onclick="goCheckout()">Proceed to checkout · ${INR(total)}</button>
      `;
      return;
    }

    if (state.checkoutStep === 'checkout') {
      title.textContent = 'Delivery details';
      body.innerHTML = `
        <div class="form-group">
          <label>Your name *</label>
          <input id="ckName" placeholder="Full name" />
        </div>
        <div class="form-group">
          <label>Phone number *</label>
          <input id="ckPhone" type="tel" placeholder="+91 9876543210" />
        </div>
        <div class="form-group">
          <label>Delivery type</label>
          <div class="toggle">
            <button id="tD" class="active" onclick="setDeliveryType('DELIVERY')">🛵 Home delivery</button>
            <button id="tP" onclick="setDeliveryType('PICKUP')">🏪 Pickup</button>
          </div>
        </div>
        <div class="form-group" id="addrGroup">
          <label>Delivery address *</label>
          <textarea id="ckAddr" rows="2" placeholder="House no, street, landmark, area, pincode"></textarea>
        </div>
        <div class="form-group">
          <label>Payment method</label>
          <div class="toggle">
            <button id="pC" class="active" onclick="setPay('CASH')">💵 Cash on delivery</button>
            <button id="pU" onclick="setPay('UPI')">📱 UPI on delivery</button>
          </div>
        </div>
        <div class="form-group">
          <label>Notes for the shop (optional)</label>
          <input id="ckNotes" placeholder="e.g. ring the bell twice" />
        </div>
      `;
      state._ck = { deliveryType: 'DELIVERY', paymentMethod: 'CASH' };
      const subtotal = cartSubtotal();
      const delivery = subtotal >= 299 ? 0 : 25;
      const total = subtotal + delivery;
      foot.innerHTML = `
        <div class="tot-row grand"><span>To pay</span><span>${INR(total)}</span></div>
        <button id="placeBtn" class="btn-primary" onclick="placeOrder()">Place order</button>
        <button class="btn-ghost" onclick="state.checkoutStep='cart'; renderDrawer();">← Back to cart</button>
      `;
    }
  }

  function setDeliveryType(t) {
    state._ck.deliveryType = t;
    document.getElementById('tD').classList.toggle('active', t === 'DELIVERY');
    document.getElementById('tP').classList.toggle('active', t === 'PICKUP');
    document.getElementById('addrGroup').style.display = t === 'DELIVERY' ? '' : 'none';
  }
  function setPay(p) {
    state._ck.paymentMethod = p;
    document.getElementById('pC').classList.toggle('active', p === 'CASH');
    document.getElementById('pU').classList.toggle('active', p === 'UPI');
  }
  function goCheckout() { state.checkoutStep = 'checkout'; renderDrawer(); }

  async function placeOrder() {
    const name = document.getElementById('ckName').value.trim();
    const phone = document.getElementById('ckPhone').value.trim();
    const address = document.getElementById('ckAddr')?.value.trim();
    const notes = document.getElementById('ckNotes').value.trim();
    if (!name) return alert('Please enter your name');
    if (!/^\+?\d{10,15}$/.test(phone.replace(/\s/g, ''))) return alert('Please enter a valid phone');
    if (state._ck.deliveryType === 'DELIVERY' && !address) return alert('Please enter your delivery address');

    const btn = document.getElementById('placeBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Placing order…';

    const items = cartItems().map(i => ({ productId: i.product.id, quantity: i.qty }));
    const subtotal = cartSubtotal();
    const deliveryCharge = state._ck.deliveryType === 'DELIVERY' && subtotal < 299 ? 25 : 0;

    try {
      const res = await fetch(`${API}/stores/${state.storeId}/orders`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          customer: { name, phone, address },
          items,
          deliveryType: state._ck.deliveryType,
          paymentMethod: state._ck.paymentMethod,
          deliveryCharge,
          notes,
        }),
      });
      const data = await res.json();
      if (!res.ok || !data.success) throw new Error(data.message || 'Order failed');
      state.lastOrder = data.data;
      state.cart = {};
      save();
      updateCartBar();
      state.checkoutStep = 'success';
      renderDrawer();
      // refresh product stock
      loadCatalogue();
    } catch (err) {
      btn.disabled = false;
      btn.textContent = 'Place order';
      alert('Could not place order: ' + err.message);
    }
  }

  document.getElementById('searchInput').addEventListener('input', (e) => {
    state.filter.q = e.target.value;
    renderProducts();
  });

  init();
</script>
</body>
</html>
