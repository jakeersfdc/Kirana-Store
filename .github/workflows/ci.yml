name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm test --if-present
        env:
          NODE_ENV: test
          JWT_SECRET: test_secret_long_enough_for_validation_xx
          DB_DIALECT: sqlite
          DB_STORAGE: ./data/test.sqlite

  docker-build:
    needs: lint-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image (sanity check)
        run: docker build -t kirana-saas-api:ci ./backend
