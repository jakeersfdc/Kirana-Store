# Render.com — one-click deploy (free tier: 0 ₹/month)
# Push this repo to GitHub, then on render.com: New + > Blueprint > pick repo
services:
  - type: web
    name: kirana-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    rootDir: backend
    plan: free
    region: singapore
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: APP_URL
        sync: false
      - key: CORS_ORIGINS
        value: "*"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DB_DIALECT
        value: postgres
      - key: DB_HOST
        fromDatabase:
          name: kirana-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: kirana-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: kirana-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: kirana-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: kirana-db
          property: password
      - key: DB_SSL
        value: "true"
      - key: RUN_MIGRATIONS
        value: "true"
      - key: AUTO_SEED
        value: "true"
      - key: TRUST_PROXY
        value: "1"
      - key: LOG_LEVEL
        value: info
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false

databases:
  - name: kirana-db
    plan: free
    databaseName: kirana_saas
    user: kirana
    region: singapore
